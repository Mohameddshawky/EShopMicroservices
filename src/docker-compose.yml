services:
  catalogdb:
    image: postgres:17
  basketdb:
    image: postgres:17

  distributedcache:
   image: redis:7  

  catalogapi:
    image: ${DOCKER_REGISTRY-}catalogapi
    build:
      context: .
      dockerfile: Services/Catalog/CatalogApi/Dockerfile
   

  basket.api:
    image: ${DOCKER_REGISTRY-}basketapi
    build:
      context: .
      dockerfile: Services/Basket/Basket.Api/Dockerfile

volumes: 
  postgres_catalog:
  postgres_basket:
  
 


